<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>History — MedExplain AI</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="css/style.css" rel="stylesheet">
<link href="css/dashboard.css" rel="stylesheet">
</head>
<body>

<!-- ================= NAVBAR ================= -->
<nav class="navbar navbar-expand-lg navbar-glass">
  <div class="container">
    <a class="navbar-brand navbar-brand-custom" href="index.html">
      <i class="bi bi-heart-pulse-fill me-1"></i>MedExplain<span>AI</span>
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMain">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMain">
      <ul class="navbar-nav mx-auto">
        <li class="nav-item"><a class="nav-link nav-link-custom" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link nav-link-custom" href="dashboard.html">Dashboard</a></li>
        <li class="nav-item"><a class="nav-link nav-link-custom active" href="history.html">History</a></li>
      </ul>
      <ul class="navbar-nav align-items-lg-center gap-2" id="navAuthLinks"></ul>
      <button class="theme-toggle-btn ms-lg-3 mt-2 mt-lg-0" id="themeToggleBtn" title="Toggle dark mode">
        <i class="bi bi-moon-stars-fill" id="themeIcon"></i>
      </button>
    </div>
  </div>
</nav>

<div class="container dashboard-shell">
  <div class="d-flex justify-content-between align-items-center flex-wrap gap-3 mb-4">
    <div>
      <h3 class="mb-1"><i class="bi bi-clock-history me-2"></i>Report History</h3>
      <p class="text-muted mb-0">All your uploaded reports, newest first.</p>
    </div>
    <div style="min-width: 280px;">
      <input type="text" class="form-control" id="historySearchInput" placeholder="Search by report or hospital name...">
    </div>
  </div>

  <div id="historyEmptyState" class="glass-card text-center py-5" style="display:none;">
    <i class="bi bi-inbox display-4 text-muted"></i>
    <p class="mt-3 mb-2 fw-semibold">No reports found</p>
    <p class="text-muted small mb-3">Upload your first medical report to see it appear here.</p>
    <a href="dashboard.html" class="btn btn-brand">Upload a Report</a>
  </div>

  <div id="historyTimeline" class="timeline"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/main.js"></script>
<script src="js/history.js"></script>
</body>
</html>
