<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Login — MedExplain AI</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="css/style.css" rel="stylesheet">
<link href="css/auth.css" rel="stylesheet">
</head>
<body>

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo"><i class="bi bi-heart-pulse-fill"></i></div>
    <h3 class="auth-title">Welcome Back</h3>
    <p class="auth-subtitle">Login to view your medical report explanations</p>

    <form id="loginForm" novalidate>
      <div class="floating-input">
        <input type="email" id="loginEmail" placeholder=" " required />
        <label for="loginEmail">Email address</label>
        <div class="field-error" id="loginEmailError">Please enter a valid email address.</div>
      </div>

      <div class="floating-input">
        <input type="password" id="loginPassword" placeholder=" " required minlength="6" />
        <label for="loginPassword">Password</label>
        <div class="field-error" id="loginPasswordError">Password must be at least 6 characters.</div>
      </div>

      <button type="submit" class="btn btn-brand w-100 mt-2" id="loginSubmitBtn">
        <span id="loginSpinner" class="spinner-border spinner-border-sm me-2" style="display:none;"></span>
        Login
      </button>
    </form>

    <div class="auth-divider">New here?</div>
    <div class="auth-footer-link">
      Don't have an account? <a href="register.html">Create one</a>
    </div>
    <div class="auth-footer-link mt-2">
      <a href="index.html"><i class="bi bi-arrow-left"></i> Back to Home</a>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/main.js"></script>
<script>
  document.getElementById("loginForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const email = document.getElementById("loginEmail");
    const password = document.getElementById("loginPassword");
    let valid = true;

    if (!email.value.includes("@") || email.value.length < 5) {
      document.getElementById("loginEmailError").classList.add("visible");
      valid = false;
    } else {
      document.getElementById("loginEmailError").classList.remove("visible");
    }

    if (password.value.length < 6) {
      document.getElementById("loginPasswordError").classList.add("visible");
      valid = false;
    } else {
      document.getElementById("loginPasswordError").classList.remove("visible");
    }

    if (!valid) return;

    const submitBtn = document.getElementById("loginSubmitBtn");
    const spinner = document.getElementById("loginSpinner");
    submitBtn.disabled = true;
    spinner.style.display = "inline-block";

    try {
      const response = await fetch(`${API_BASE_URL}/login`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email: email.value.trim(), password: password.value }),
      });

      const data = await response.json();

      if (!response.ok) {
        showToast(data.detail || "Login failed.", "error");
        return;
      }

      setToken(data.access_token);
      showToast("Login successful! Redirecting...", "success");
      setTimeout(() => (window.location.href = "dashboard.html"), 600);
    } catch (err) {
      showToast("Network error. Is the backend server running?", "error");
    } finally {
      submitBtn.disabled = false;
      spinner.style.display = "none";
    }
  });

  // Redirect already-logged-in users straight to dashboard
  if (isLoggedIn()) {
    window.location.href = "dashboard.html";
  }
</script>
</body>
</html>
